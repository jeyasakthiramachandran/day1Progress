<div class="page-container">
  <h2 class="page-title">Create Match</h2>

  <div class="card">
    <form [formGroup]="matchForm" (ngSubmit)="onSubmit()" class="form-grid">

      <!-- First Team -->
      <div class="form-group">
        <label>First Team</label>
        <select formControlName="firstTeam">
          <option value="">Select a Team</option>
          <option *ngFor="let team of teams" [ngValue]="team">
            {{ team.teamName }}
          </option>
        </select>
        <div class="error" *ngIf="matchForm.get('firstTeam')?.invalid && matchForm.get('firstTeam')?.touched">
          First team is required.
        </div>
      </div>

      <!-- Second Team -->
      <div class="form-group">
        <label>Second Team</label>
        <select formControlName="secondTeam">
          <option value="">Select a Team</option>
          <option *ngFor="let team of teams" [ngValue]="team">
            {{ team.teamName }}
          </option>
        </select>
        <div class="error" *ngIf="matchForm.get('secondTeam')?.invalid && matchForm.get('secondTeam')?.touched">
          Second team is required.
        </div>
      </div>

      <!-- Match Date -->
      <div class="form-group">
        <label>Match Date</label>
        <input type="date" formControlName="matchDate">
        <div class="error" *ngIf="matchForm.get('matchDate')?.invalid && matchForm.get('matchDate')?.touched">
          Match date is required.
        </div>
      </div>

      <!-- Venue -->
      <div class="form-group">
        <label>Venue</label>
        <input type="text"
               formControlName="venue"
               placeholder="Enter Venue (letters only)"
               (keypress)="blockNumbers($event)">
        <div class="error" *ngIf="matchForm.get('venue')?.invalid && matchForm.get('venue')?.touched">
          <span *ngIf="matchForm.get('venue')?.hasError('required')">Venue is required.</span>
          <span *ngIf="matchForm.get('venue')?.hasError('pattern')">Only letters allowed.</span>
        </div>
      </div>

      <!-- Result -->
      <div class="form-group">
        <label>Result</label>
        <input type="text" formControlName="result" placeholder="Enter Result">
      </div>

      <!-- Status -->
      <div class="form-group">
        <label>Status</label>
        <select formControlName="status">
          <option value="">Select Status</option>
          <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
        </select>
        <div class="error" *ngIf="matchForm.get('status')?.invalid && matchForm.get('status')?.touched">
          Status is required.
        </div>
      </div>

      <!-- Buttons -->
      <div class="form-actions">
        <button type="submit" [disabled]="matchForm.invalid">
          Create Match
        </button>
        <br>
        <a routerLink="/ipl" class="link-btn">Dashboard</a>
      </div>

    </form>

    <!-- Messages -->
    <div *ngIf="successMessage" class="success-msg">
      {{ successMessage }}
    </div>
    <div *ngIf="errorMessage" class="error-msg">
      {{ errorMessage }}
    </div>

  </div>
</div>
