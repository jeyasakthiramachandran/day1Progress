<div class="page-container">
  <h2 class="page-title">Create Team</h2>

  <div class="card">
    <form [formGroup]="teamForm" (ngSubmit)="onSubmit()" class="form-grid">

      <!-- Team Name -->
      <div class="form-group">
        <label>Team Name</label>
        <input type="text" formControlName="teamName" placeholder="Enter Team Name">
        <div class="error" *ngIf="teamForm.get('teamName')?.invalid && teamForm.get('teamName')?.touched">
          <span *ngIf="teamForm.get('teamName')?.hasError('required')">Team Name is required.</span>
          <span *ngIf="teamForm.get('teamName')?.hasError('pattern')">No special characters allowed.</span>
        </div>
      </div>

      <!-- Location -->
      <div class="form-group">
        <label>Location</label>
        <input type="text"
               formControlName="location"
               placeholder="Enter Location (letters only)"
               (keypress)="blockNumbers($event)">
        <div class="error" *ngIf="teamForm.get('location')?.invalid && teamForm.get('location')?.touched">
          <span *ngIf="teamForm.get('location')?.hasError('required')">Location is required.</span>
          <span *ngIf="teamForm.get('location')?.hasError('pattern')">Only letters allowed.</span>
        </div>
      </div>

      <!-- Owner Name -->
      <div class="form-group">
        <label>Owner Name</label>
        <input type="text"
               formControlName="ownerName"
               placeholder="Enter Owner Name (letters only)"
               (keypress)="blockNumbers($event)">
        <div class="error" *ngIf="teamForm.get('ownerName')?.invalid && teamForm.get('ownerName')?.touched">
          <span *ngIf="teamForm.get('ownerName')?.hasError('required')">Owner Name is required.</span>
          <span *ngIf="teamForm.get('ownerName')?.hasError('minlength')">Minimum 2 characters required.</span>
          <span *ngIf="teamForm.get('ownerName')?.hasError('pattern')">Only letters allowed.</span>
        </div>
      </div>

      <!-- Establishment Year -->
      <div class="form-group">
        <label>Establishment Year</label>
        <input type="number"
               formControlName="establishmentYear"
               placeholder="Enter Year">
        <div class="error" *ngIf="teamForm.get('establishmentYear')?.invalid && teamForm.get('establishmentYear')?.touched">
          <span *ngIf="teamForm.get('establishmentYear')?.hasError('required')">Year is required.</span>
          <span *ngIf="teamForm.get('establishmentYear')?.hasError('min')">Min: 1900</span>
          <span *ngIf="teamForm.get('establishmentYear')?.hasError('max')">Max: {{ currentYear }}</span>
        </div>
      </div>

      <!-- Actions -->
      <div class="form-actions">
        <button type="submit" [disabled]="teamForm.invalid">
          Create Team
        </button>
        <a routerLink="/ipl" class="link-btn">Dashboard</a>
      </div>

    </form>

    <!-- Messages -->
    <div *ngIf="successMessage" class="success-msg">
      {{ successMessage }}
    </div>
    <div *ngIf="errorMessage" class="error-msg">
      {{ errorMessage }}
    </div>

  </div>
</div>
