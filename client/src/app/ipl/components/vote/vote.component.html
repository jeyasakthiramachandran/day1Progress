<div class="page-container">

  <h2 class="page-title">Submit Your Vote</h2>

  <div class="card vote-form-container">
    <form [formGroup]="voteForm" (ngSubmit)="onSubmit()" class="form-grid">

      <!-- Email -->
      <div class="form-group">
        <label for="email">UserName</label>
        <input 
          id="email"
          formControlName="email"
          type="email"
          placeholder="Email"
          readonly
          class="readonly-field">

        <div *ngIf="voteForm.get('email')?.invalid && voteForm.get('email')?.touched" class="error">
          <small>Valid email is required.</small>
        </div>
      </div>

      <!-- Category -->
      <div class="form-group">
        <label for="category">Category</label>
        <select formControlName="category">
          <option value="">Select Category</option>
          <option value="Cricketer">Cricketer</option>
          <option value="Team">Team</option>
        </select>

        <div *ngIf="voteForm.get('category')?.invalid && voteForm.get('category')?.touched" class="error">
          <small>Category is required.</small>
        </div>
      </div>

      <!-- Cricketer -->
      <div class="form-group" *ngIf="voteForm.get('category')?.value === 'Cricketer'">
        <label for="cricketer">Cricketer</label>
        <select id="cricketer" formControlName="cricketer">
          <option value="">Select a Cricketer</option>
          <option *ngFor="let cricketer of cricketers" [ngValue]="cricketer">
            {{ cricketer.cricketerName }}
          </option>
        </select>

        <div *ngIf="voteForm.get('cricketer')?.invalid && voteForm.get('cricketer')?.touched" class="error">
          <small>Please select a cricketer.</small>
        </div>
      </div>

      <!-- Team -->
      <div class="form-group" *ngIf="voteForm.get('category')?.value === 'Team'">
        <label for="team">Team</label>
        <select id="team" formControlName="team">
          <option value="">Select a Team</option>
          <option *ngFor="let team of teams" [ngValue]="team">
            {{ team.teamName }}
          </option>
        </select>

        <div *ngIf="voteForm.get('team')?.invalid && voteForm.get('team')?.touched" class="error">
          <small>Please select a team.</small>
        </div>
      </div>

      <!-- Note -->
      <div class="form-full">
        <p class="vote-note">
          ⚠️ Note: You can only vote once per category (cricketer or team).
        </p>
      </div>

      <!-- Actions -->
      <div class="form-actions form-full">
        <button type="submit" [disabled]="voteForm.invalid">
          Submit Vote
        </button>
        <a routerLink="/ipl" class="task-list">Dashboard</a>
      </div>

    </form>

    <!-- Messages -->
    <div *ngIf="successMessage" class="success">
      {{ successMessage }}
    </div>

    <div *ngIf="errorMessage" class="error">
      {{ errorMessage }}
    </div>

  </div>
</div>
