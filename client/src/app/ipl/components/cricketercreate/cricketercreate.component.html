<div class="page-container">
  <h2 class="page-title">Create Cricketer</h2>

  <div class="card">
    <form [formGroup]="cricketerForm" (ngSubmit)="onSubmit()" class="form-grid">

      <!-- Team -->
      <div class="form-group">
        <label>Team</label>
        <select formControlName="team">
          <option value="">Select a Team</option>
          <option *ngFor="let team of teams" [ngValue]="team">
            {{ team.teamName }}
          </option>
        </select>

        <div class="error" *ngIf="cricketerForm.get('team')?.touched && cricketerForm.get('team')?.invalid">
          Team is required
        </div>
      </div>

      <!-- Cricketer Name -->
      <div class="form-group">
        <label>Cricketer Name</label>
        <input 
          type="text"
          formControlName="cricketerName"
          placeholder="Enter Cricketer Name"
          (keypress)="blockNumbers($event)">

        <div class="error" *ngIf="cricketerForm.get('cricketerName')?.touched && cricketerForm.get('cricketerName')?.invalid">
          <span *ngIf="cricketerForm.get('cricketerName')?.hasError('required')">
            Name is required
          </span>
          <span *ngIf="cricketerForm.get('cricketerName')?.hasError('pattern')">
            Only letters allowed
          </span>
        </div>
      </div>

      <!-- Age -->
      <div class="form-group">
        <label>Age</label>
        <input 
          type="number"
          formControlName="age"
          placeholder="Enter Age"
          min="18">

        <div class="error" *ngIf="cricketerForm.get('age')?.touched && cricketerForm.get('age')?.invalid">
          <span *ngIf="cricketerForm.get('age')?.hasError('required')">
            Age is required
          </span>
          <span *ngIf="cricketerForm.get('age')?.hasError('min')">
            Minimum age is 18
          </span>
        </div>
      </div>

      <!-- Nationality -->
      <div class="form-group">
        <label>Nationality</label>
        <input 
          type="text"
          formControlName="nationality"
          placeholder="Enter Nationality"
          (keypress)="blockNumbers($event)">

        <div class="error" *ngIf="cricketerForm.get('nationality')?.touched && cricketerForm.get('nationality')?.invalid">
          <span *ngIf="cricketerForm.get('nationality')?.hasError('required')">
            Nationality is required
          </span>
          <span *ngIf="cricketerForm.get('nationality')?.hasError('pattern')">
            Only letters allowed
          </span>
        </div>
      </div>

      <!-- Experience -->
      <div class="form-group">
        <label>Experience (years)</label>
        <input 
          type="number"
          formControlName="experience"
          placeholder="Enter Experience"
          min="0">

        <div class="error" *ngIf="cricketerForm.get('experience')?.touched && cricketerForm.get('experience')?.invalid">
          <span *ngIf="cricketerForm.get('experience')?.hasError('required')">
            Experience is required
          </span>
          <span *ngIf="cricketerForm.get('experience')?.hasError('min')">
            Cannot be negative
          </span>
        </div>
      </div>

      <!-- Role -->
      <div class="form-group">
        <label>Role</label>
        <select formControlName="role">
          <option value="">Select Role</option>
          <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
        </select>

        <div class="error" *ngIf="cricketerForm.get('role')?.touched && cricketerForm.get('role')?.invalid">
          Role is required
        </div>
      </div>

      <!-- Total Runs -->
      <div class="form-group">
        <label>Total Runs</label>
        <input 
          type="number"
          formControlName="totalRuns"
          placeholder="Enter Total Runs"
          min="0">

        <div class="error" *ngIf="cricketerForm.get('totalRuns')?.touched && cricketerForm.get('totalRuns')?.invalid">
          Cannot be negative
        </div>
      </div>

      <!-- Total Wickets -->
      <div class="form-group">
        <label>Total Wickets</label>
        <input 
          type="number"
          formControlName="totalWickets"
          placeholder="Enter Total Wickets"
          min="0">

        <div class="error" *ngIf="cricketerForm.get('totalWickets')?.touched && cricketerForm.get('totalWickets')?.invalid">
          Cannot be negative
        </div>
      </div>

      <!-- Actions -->
      <div class="form-actions">
        <button type="submit" [disabled]="cricketerForm.invalid">
          Create Cricketer
        </button>
        <a routerLink="/ipl" class="link-btn">Dashboard</a>
      </div>

    </form>

    <!-- Messages -->
    <div *ngIf="successMessage" class="success-msg">
      {{ successMessage }}
    </div>

    <div *ngIf="errorMessage" class="error-msg">
      {{ errorMessage }}
    </div>
  </div>
</div>
