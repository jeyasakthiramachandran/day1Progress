<div class="cricketer-form-container">
  <h2>Create Cricketer</h2>

  <form [formGroup]="cricketerForm" (ngSubmit)="onSubmit()">

    <!-- Cricketer ID -->
    <div>
      <label for="cricketerId">Cricketer ID</label>
      <input
        id="cricketerId"
        type="number"
        formControlName="cricketerId"
        placeholder="Enter Cricketer ID"
      />
      <div *ngIf="cricketerForm.get('cricketerId')?.invalid && cricketerForm.get('cricketerId')?.touched" class="error">
        <small>Cricketer ID is required.</small>
      </div>
    </div>

    <!-- Team ID -->
    <div>
      <label for="teamId">Team</label>
      <select id="teamId" formControlName="teamId">
        <option value="">Select a Team</option>
        <option *ngFor="let team of teams" [value]="team.teamId">
          {{ team.teamName }}
        </option>
      </select>
      <div *ngIf="cricketerForm.get('teamId')?.invalid && cricketerForm.get('teamId')?.touched" class="error">
        <small>Team is required.</small>
      </div>
    </div>

    <!-- Cricketer Name -->
    <div>
      <label for="cricketerName">Cricketer Name</label>
      <input
        id="cricketerName"
        type="text"
        formControlName="cricketerName"
        placeholder="Enter Cricketer Name"
      />
      <div *ngIf="cricketerForm.get('cricketerName')?.invalid && cricketerForm.get('cricketerName')?.touched" class="error">
        <small>Cricketer Name is required.</small>
      </div>
    </div>

    <!-- Age -->
    <div>
      <label for="age">Age</label>
      <input id="age" type="number" formControlName="age" placeholder="Enter Age" />
      <div *ngIf="cricketerForm.get('age')?.invalid && cricketerForm.get('age')?.touched" class="error">
        <small *ngIf="cricketerForm.get('age')?.hasError('required')">Age is required.</small>
        <small *ngIf="cricketerForm.get('age')?.hasError('min')">Minimum age is 18.</small>
      </div>
    </div>

    <!-- Nationality -->
    <div>
      <label for="nationality">Nationality</label>
      <input
        id="nationality"
        type="text"
        formControlName="nationality"
        placeholder="Enter Nationality"
      />
      <div *ngIf="cricketerForm.get('nationality')?.invalid && cricketerForm.get('nationality')?.touched" class="error">
        <small>Nationality is required.</small>
      </div>
    </div>

    <!-- Experience -->
    <div>
      <label for="experience">Experience</label>
      <input
        id="experience"
        type="number"
        formControlName="experience"
        placeholder="Enter Experience"
      />
